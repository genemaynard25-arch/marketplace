<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local Marketplace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
    header { background: #2d6a4f; color: white; padding: 1.5rem 2rem; }
    header h1 { font-size: 2rem; }
    header p { opacity: 0.8; margin-top: 0.3rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; padding: 2rem; max-width: 1200px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s; }
    .card:hover { transform: translateY(-4px); }
    .card .category { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #2d6a4f; font-weight: 600; margin-bottom: 0.5rem; }
    .card h2 { font-size: 1.15rem; margin-bottom: 0.5rem; }
    .card .desc { font-size: 0.9rem; color: #666; margin-bottom: 1rem; }
    .card .price { font-size: 1.3rem; font-weight: 700; color: #2d6a4f; margin-bottom: 0.5rem; }
    .card .seller { font-size: 0.85rem; color: #888; }
    .card a { display: inline-block; margin-top: 1rem; padding: 0.5rem 1.2rem; background: #2d6a4f; color: white; border-radius: 6px; text-decoration: none; font-size: 0.9rem; }
    .card a:hover { background: #1b4332; }
  </style>
</head>
<body>
  <header>
    <h1>🛍️ Local Marketplace</h1>
    <p>Browse items from your community</p>
  </header>
  <div class="grid">
    {%PRODUCT_CARDS%}
  </div>
</body>
</html>
